<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Results Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <h1>Automated Software Testing Dashboard</h1>
        <nav>
          <a href="/">Login</a>
          <a href="/dashboard">Results Dashboard</a>
        </nav>
      </header>

      <section class="welcome">
        <h2 id="welcomeText">Welcome to Hospital Orientation Dashboard</h2>
      </section>

      <section class="stats">
        <div class="stat-card">
          <h3>Total Executed</h3>
          <p id="totalCount">0</p>
        </div>
        <div class="stat-card pass">
          <h3>Passed</h3>
          <p id="passCount">0</p>
        </div>
        <div class="stat-card fail">
          <h3>Failed</h3>
          <p id="failCount">0</p>
        </div>
      </section>

      <section>
        <h3>Execution Results</h3>
        <table>
          <thead>
            <tr>
              <th>Test Case ID</th>
              <th>Name</th>
              <th>Type</th>
              <th>Status</th>
              <th>Actual Output</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="resultsTableBody"></tbody>
        </table>
      </section>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
